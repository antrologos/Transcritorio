name: Release

# Builds Linux AppImage and macOS .dmg.
# - workflow_dispatch: trigger manual para iterar sem publicar.
# - push tag v*: gera artefatos + cria Release com eles.
#
# Bundle cross-plataforma e pesado (~3 GB de deps PyInstaller), entao
# roda so sob demanda, nao em cada push.

on:
  workflow_dispatch:
    inputs:
      version_label:
        description: 'Label para o artefato (ex: 0.3.0-rc1 ou dev)'
        required: false
        default: 'dev'
      only_platforms:
        description: 'Rebuild parcial (CSV: linux,mac,windows). Vazio = todas. Plataformas fora da lista sao puladas e seus artefatos permanecem na Release existente.'
        required: false
        default: ''
      target_tag:
        description: 'Tag a atualizar em rebuild parcial (ex: v0.1.1). Obrigatorio quando only_platforms != vazio.'
        required: false
        default: ''
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # =========================================================================
  # Gate empirico: baixa um modelo real da HF (Systran/faster-whisper-tiny,
  # 72 MB) via _manual_snapshot_download. Se falhar, nenhum build roda.
  # Criado em 2026-04-22 apos shipping de .exe com huggingface_hub 0.36.2
  # que travava em Xet Storage sem erro explicito. Preferivel descobrir aqui
  # (5 min) que 40 min depois quando o usuario reporta hang.
  # =========================================================================
  live-smoke-hf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install requests
        run: python -m pip install requests --quiet
      - name: Download real (tiny, 72 MB) — gate antes dos builds
        run: python -B tests/live_smoke_hf_download.py

  # =========================================================================
  # Linux AppImage (ubuntu-22.04 para compat com glibc 2.35 de distros antigas)
  # =========================================================================
  build-linux-appimage:
    needs: live-smoke-hf
    runs-on: ubuntu-22.04
    # Pulado em rebuild parcial quando "linux" nao esta na lista
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.only_platforms == '' || contains(inputs.only_platforms, 'linux') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            libxcb-cursor0 libxcb-shape0 libxcb-xinerama0 \
            libxkbcommon-x11-0 libegl1 libxkbcommon0 \
            libfuse2 libglib2.0-0

      - name: Install Python deps (CPU torch)
        run: |
          python -m pip install --upgrade pip wheel setuptools
          # torchvision: necessario porque torchmetrics.functional.image.arniqa
          # (transitiva via pyannote.audio -> lightning -> torchmetrics) importa
          # torchvision eagerly. v0.1.3 CI gate pegou.
          python -m pip install torch==2.8.0 torchaudio==2.8.0 torchvision==0.23.0 \
            --index-url https://download.pytorch.org/whl/cpu
          python -m pip install torchcodec==0.7.0
          python -m pip install -e . "pyinstaller>=6.0"

      - name: Download + stage FFmpeg (johnvansickle static x86_64)
        # Para o AppImage vir com ffmpeg + ffprobe embutidos — usuario nao
        # precisa de 'sudo apt install ffmpeg'. packaging/transcritorio.spec
        # linhas 168-172 incluem qualquer arquivo em packaging/vendor/ffmpeg/bin/.
        run: |
          URL="https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz"
          mkdir -p "$GITHUB_WORKSPACE/packaging/vendor/ffmpeg/bin"
          curl -fLsS "$URL" -o /tmp/ffmpeg.tar.xz
          tar -xJf /tmp/ffmpeg.tar.xz -C /tmp
          EXTRACTED=$(find /tmp -maxdepth 1 -type d -name 'ffmpeg-*-static' | head -1)
          cp "$EXTRACTED/ffmpeg" "$EXTRACTED/ffprobe" \
             "$GITHUB_WORKSPACE/packaging/vendor/ffmpeg/bin/"
          chmod +x "$GITHUB_WORKSPACE/packaging/vendor/ffmpeg/bin/"*
          ls -la "$GITHUB_WORKSPACE/packaging/vendor/ffmpeg/bin/"
          "$GITHUB_WORKSPACE/packaging/vendor/ffmpeg/bin/ffmpeg" -version | head -1

      - name: Run PyInstaller
        env:
          TRANSCRITORIO_REPO_ROOT: ${{ github.workspace }}
          TRANSCRITORIO_BUNDLE_VARIANT: cpu
        run: |
          python -m PyInstaller --distpath dist --workpath build \
            --clean --noconfirm packaging/transcritorio.spec

      - name: Frozen-bundle smoke-test (download+verify+load+transcribe REAL)
        # Gate critico end-to-end: roda transcritorio-cli FROZEN que:
        # 1. Baixa Systran/faster-whisper-tiny real da HF (72 MB)
        # 2. Verifica via cached_snapshot_path + _snapshot_has_weights
        # 3. Carrega o modelo com faster_whisper
        # 4. Transcreve 3s de silencio (dry-run)
        # Se qualquer passo falhar, release PARA antes de publicar.
        # Pega bugs reais do bundle: Xet download, symlink handling,
        # verify logic, faster_whisper integration, transcribe pipeline.
        run: dist/Transcritorio/transcritorio-cli models smoke-test

      - name: Frozen-bundle whisperx import chain gate
        # Gate contra bugs de copy_metadata/hiddenimports em transformers/whisperx.
        # `whisperx --help` passa antes dos imports lazy, entao precisamos de
        # audio real para exercitar audio_utils.py:55 (version("torchcodec")) e
        # toda a cadeia transformers.Wav2Vec2ForCTC -> torchaudio.
        # Bug historico v0.1.1-v0.1.4: PackageNotFoundError: torchcodec,
        # ModuleNotFoundError: torchvision.
        # Sem --model_cache_only para deixar o whisperx baixar tiny se preciso
        # (~10s extras), em troca de gate independente de coordenacao de cache.
        run: |
          set -e
          python -c "import wave; w=wave.open('silence.wav','wb'); w.setnchannels(1); w.setsampwidth(2); w.setframerate(16000); w.writeframes(b'\0' * (16000 * 3 * 2)); w.close()"
          dist/Transcritorio/whisperx silence.wav --model tiny --device cpu --compute_type int8 --no_align --language pt --output_dir wx_out --model_dir "${RUNNER_TEMP}/tiny_cache"

      - name: Frozen-bundle cache-verify gate (fake cache, 2 variantes)
        # Complementa o smoke-test: roda verify contra caches fake com
        # symlink E copy variants, pra validar o check de cache em ambos
        # cenarios de filesystem (Windows com/sem Developer Mode).
        run: |
          set -e
          FAKE_CACHE="${RUNNER_TEMP:-/tmp}/fake_hf_cache"
          rm -rf "$FAKE_CACHE"
          python tests/prepare_fake_hf_cache.py "$FAKE_CACHE"
          TRANSCRITORIO_MODEL_CACHE="$FAKE_CACHE" \
            dist/Transcritorio/transcritorio-cli models verify
          rm -rf "$FAKE_CACHE"
          python tests/prepare_fake_hf_cache.py "$FAKE_CACHE" --force-copy
          TRANSCRITORIO_MODEL_CACHE="$FAKE_CACHE" \
            dist/Transcritorio/transcritorio-cli models verify
          echo "OK: verify passa em ambas variantes"

      - name: Generate PNG icon from SVG
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python <<'PYEOF'
          from PySide6.QtCore import QSize
          from PySide6.QtGui import QImage, QPainter
          from PySide6.QtSvg import QSvgRenderer
          from PySide6.QtWidgets import QApplication
          import sys
          app = QApplication(sys.argv)
          r = QSvgRenderer('assets/transcritorio_icon.svg')
          for size in (16, 32, 48, 64, 128, 256, 512):
              img = QImage(QSize(size, size), QImage.Format.Format_ARGB32)
              img.fill(0)
              p = QPainter(img)
              r.render(p)
              p.end()
              img.save(f'transcritorio_{size}.png')
          print('PNG icons gerados')
          PYEOF

      - name: Build AppImage
        run: |
          # Download appimagetool
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool

          # Estrutura AppDir
          mkdir -p AppDir/usr/bin \
                   AppDir/usr/share/applications \
                   AppDir/usr/share/icons/hicolor/256x256/apps \
                   AppDir/usr/share/icons/hicolor/512x512/apps

          # Copia bundle PyInstaller
          cp -r dist/Transcritorio/* AppDir/usr/bin/

          # Icons
          cp transcritorio_256.png AppDir/usr/share/icons/hicolor/256x256/apps/transcritorio.png
          cp transcritorio_512.png AppDir/usr/share/icons/hicolor/512x512/apps/transcritorio.png
          cp transcritorio_256.png AppDir/transcritorio.png
          cp transcritorio_256.png AppDir/.DirIcon

          # .desktop
          cat > AppDir/usr/share/applications/transcritorio.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=Transcritorio
          Comment=Transcricao local de entrevistas em portugues brasileiro
          Exec=Transcritorio %F
          Icon=transcritorio
          Categories=AudioVideo;Office;Education;
          Terminal=false
          StartupWMClass=Transcritorio
          EOF
          cp AppDir/usr/share/applications/transcritorio.desktop AppDir/

          # AppRun
          cat > AppDir/AppRun <<'EOF'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          export PATH="$HERE/usr/bin:$PATH"
          exec "$HERE/usr/bin/Transcritorio" "$@"
          EOF
          chmod +x AppDir/AppRun

          # Constroi AppImage
          export ARCH=x86_64
          ./appimagetool AppDir "Transcritorio-${ARCH}.AppImage"
          ls -la Transcritorio-*.AppImage

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: Transcritorio-linux-AppImage
          path: Transcritorio-*.AppImage
          retention-days: 30

  # =========================================================================
  # Smoke test Linux — valida que o AppImage roda num Ubuntu limpo
  # (~70% do checklist manual; parte visual ainda precisa usuario)
  # =========================================================================
  smoke-linux-appimage:
    needs: build-linux-appimage
    runs-on: ubuntu-22.04
    # So roda quando build-linux-appimage efetivamente rodou
    if: ${{ needs.build-linux-appimage.result == 'success' }}
    steps:
      - name: Checkout (para ter os tests/)
        uses: actions/checkout@v4

      - name: Download AppImage artifact
        uses: actions/download-artifact@v4
        with:
          name: Transcritorio-linux-AppImage

      - name: Install END-USER runtime deps (o que LINUX_INSTALL.md pede)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-sync1 \
            libxcb-util1 libxcb-xfixes0 libxcb-xinerama0 libxcb-xkb1 \
            libxkbcommon-x11-0 libxkbcommon0 libegl1 \
            libfuse2 libglib2.0-0 \
            libasound2

      - name: Make AppImage executable
        run: |
          chmod +x Transcritorio-*.AppImage
          ls -la Transcritorio-*.AppImage

      - name: Extract AppImage (para poder invocar a CLI interna)
        run: |
          ./Transcritorio-x86_64.AppImage --appimage-extract >/dev/null
          ls squashfs-root/usr/bin/ | head -20

      - name: Smoke CLI — transcritorio-cli --help responde
        run: |
          ./squashfs-root/usr/bin/transcritorio-cli --help > cli_help.txt 2>&1 \
            || { echo "FAIL: CLI --help nao responde"; cat cli_help.txt; exit 1; }
          grep -q "manifest" cli_help.txt \
            && grep -q "transcribe" cli_help.txt \
            || { echo "FAIL: CLI help incompleto"; cat cli_help.txt; exit 1; }
          echo "OK: CLI --help tem manifest + transcribe"

      - name: Smoke GUI — offscreen Qt sobrevive >=3s
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          # offscreen = plataforma Qt que nao precisa de X server. Valida que
          # o app inicializa (imports, PySide6 carrega, GUI construida) sem
          # precisar de Xvfb ou libs xcb. Exit 124 = killed by timeout = OK.
          set +e
          timeout --preserve-status 3 ./squashfs-root/usr/bin/Transcritorio > gui_log.txt 2>&1
          code=$?
          set -e
          echo "GUI exit code: $code"
          echo "--- stdout/stderr (ultimas 50 linhas) ---"
          tail -50 gui_log.txt
          if [ $code -eq 124 ] || [ $code -eq 0 ] || [ $code -eq 143 ]; then
            echo "OK: GUI sobreviveu startup em offscreen (exit=$code)"
          else
            echo "FAIL: GUI crashou em offscreen (exit=$code)"
            exit 1
          fi

      - name: Smoke imports — pacote Python interno importa limpo
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          # Usa Python do AppImage (bundled) via invocacao direta
          ./squashfs-root/usr/bin/transcritorio-cli models verify 2>&1 | head -20 \
            || echo "(models verify pode pedir token — OK falhar aqui, so estamos checando que nao crashou)"
          echo "OK: CLI responde a subcomandos"

  # =========================================================================
  # macOS .dmg (macos-14 = Apple Silicon arm64)
  # =========================================================================
  build-macos-dmg:
    needs: live-smoke-hf
    runs-on: macos-14
    # Pulado em rebuild parcial quando "mac" nao esta na lista
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.only_platforms == '' || contains(inputs.only_platforms, 'mac') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install system deps
        run: |
          brew install ffmpeg
          brew install create-dmg

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip wheel
          # setuptools<81: versoes >=81 removeram pkg_resources.NullProvider,
          # quebrando PyInstaller runtime hook pyi_rth_pkgres (AttributeError
          # no startup do .app). Gate de smoke-test em 2026-04-23 pegou isso
          # no CI Mac; pin explicito ate PyInstaller releases fix.
          python -m pip install "setuptools<81"
          # macOS: wheels oficiais do pytorch sao arm64+CPU/MPS (nao tem CUDA)
          # torchvision: necessario porque torchmetrics.functional.image.arniqa
          # (transitiva via pyannote.audio -> lightning -> torchmetrics) importa
          # torchvision eagerly. v0.1.3 CI gate pegou.
          python -m pip install torch==2.8.0 torchaudio==2.8.0 torchvision==0.23.0
          python -m pip install torchcodec==0.7.0
          # mlx-whisper fornece o caminho de aceleracao Metal no Apple Silicon.
          # macos-14 runner e arm64 (M1), entao mlx instala sem problema.
          # Instalado ANTES do PyInstaller para que seja incluido no .app.
          python -m pip install "mlx-whisper>=0.4.0"
          python -m pip install -e . "pyinstaller>=6.0"

      - name: Download + stage FFmpeg (evermeet.cx arm64)
        # Para o .dmg vir com ffmpeg + ffprobe embutidos no Transcritorio.app —
        # usuario Mac nao precisa de 'brew install ffmpeg'. packaging/transcritorio.spec
        # linhas 168-172 incluem qualquer arquivo em packaging/vendor/ffmpeg/bin/.
        run: |
          mkdir -p "$GITHUB_WORKSPACE/packaging/vendor/ffmpeg/bin"
          curl -fLsS "https://evermeet.cx/ffmpeg/getrelease/ffmpeg/zip" -o /tmp/ffmpeg.zip
          curl -fLsS "https://evermeet.cx/ffmpeg/getrelease/ffprobe/zip" -o /tmp/ffprobe.zip
          mkdir -p /tmp/ffmpeg-extract /tmp/ffprobe-extract
          unzip -j -o /tmp/ffmpeg.zip -d /tmp/ffmpeg-extract
          unzip -j -o /tmp/ffprobe.zip -d /tmp/ffprobe-extract
          cp /tmp/ffmpeg-extract/ffmpeg "$GITHUB_WORKSPACE/packaging/vendor/ffmpeg/bin/"
          cp /tmp/ffprobe-extract/ffprobe "$GITHUB_WORKSPACE/packaging/vendor/ffmpeg/bin/"
          chmod +x "$GITHUB_WORKSPACE/packaging/vendor/ffmpeg/bin/"*
          file "$GITHUB_WORKSPACE/packaging/vendor/ffmpeg/bin/"*
          "$GITHUB_WORKSPACE/packaging/vendor/ffmpeg/bin/ffmpeg" -version | head -1

      - name: Generate .icns from SVG
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python <<'PYEOF'
          from PySide6.QtCore import QSize
          from PySide6.QtGui import QImage, QPainter
          from PySide6.QtSvg import QSvgRenderer
          from PySide6.QtWidgets import QApplication
          import sys, os
          app = QApplication(sys.argv)
          r = QSvgRenderer('assets/transcritorio_icon.svg')
          os.makedirs('Transcritorio.iconset', exist_ok=True)
          # Apple icon sizes esperadas pelo iconutil
          for (size, name) in [
              (16, 'icon_16x16.png'), (32, 'icon_16x16@2x.png'),
              (32, 'icon_32x32.png'), (64, 'icon_32x32@2x.png'),
              (128, 'icon_128x128.png'), (256, 'icon_128x128@2x.png'),
              (256, 'icon_256x256.png'), (512, 'icon_256x256@2x.png'),
              (512, 'icon_512x512.png'), (1024, 'icon_512x512@2x.png'),
          ]:
              img = QImage(QSize(size, size), QImage.Format.Format_ARGB32)
              img.fill(0)
              p = QPainter(img)
              r.render(p)
              p.end()
              img.save(f'Transcritorio.iconset/{name}')
          PYEOF
          iconutil -c icns Transcritorio.iconset -o assets/transcritorio_icon.icns
          ls -la assets/transcritorio_icon.icns

      - name: Run PyInstaller (produz Transcritorio.app via BUNDLE)
        env:
          TRANSCRITORIO_REPO_ROOT: ${{ github.workspace }}
          TRANSCRITORIO_BUNDLE_VARIANT: cpu
        run: |
          python -m PyInstaller --distpath dist --workpath build \
            --clean --noconfirm packaging/transcritorio.spec
          ls -la dist/

      - name: Frozen-bundle smoke-test (download+verify+load+transcribe REAL)
        run: dist/Transcritorio.app/Contents/MacOS/transcritorio-cli models smoke-test

      - name: Frozen-bundle whisperx import chain gate
        # Gate contra bugs de copy_metadata/hiddenimports em transformers/whisperx.
        # Bug historico v0.1.1-v0.1.4: PackageNotFoundError: torchcodec,
        # ModuleNotFoundError: torchvision.
        # Sem --model_cache_only para deixar o whisperx baixar tiny se preciso.
        run: |
          set -e
          python -c "import wave; w=wave.open('silence.wav','wb'); w.setnchannels(1); w.setsampwidth(2); w.setframerate(16000); w.writeframes(b'\0' * (16000 * 3 * 2)); w.close()"
          dist/Transcritorio.app/Contents/MacOS/whisperx silence.wav --model tiny --device cpu --compute_type int8 --no_align --language pt --output_dir wx_out --model_dir "${RUNNER_TEMP}/tiny_cache"

      - name: Frozen-bundle cache-verify gate (fake cache, 2 variantes)
        run: |
          set -e
          FAKE_CACHE="${RUNNER_TEMP:-/tmp}/fake_hf_cache"
          CLI="dist/Transcritorio.app/Contents/MacOS/transcritorio-cli"
          rm -rf "$FAKE_CACHE"
          python tests/prepare_fake_hf_cache.py "$FAKE_CACHE"
          TRANSCRITORIO_MODEL_CACHE="$FAKE_CACHE" "$CLI" models verify
          rm -rf "$FAKE_CACHE"
          python tests/prepare_fake_hf_cache.py "$FAKE_CACHE" --force-copy
          TRANSCRITORIO_MODEL_CACHE="$FAKE_CACHE" "$CLI" models verify
          echo "OK: frozen Mac CLI valida ambas variantes"

      - name: Remover sub-apps Qt (dev tools) antes do codesign
        # PyInstaller 6.5+ MOVE (nao duplica) os binarios Qt para
        # Contents/Resources/PySide6/; deixa apenas symlinks em
        # Contents/Frameworks/PySide6/. Nosso cleanup antigo so limpava
        # Frameworks, entao deletava os symlinks mas mantinha os binarios
        # reais em Resources — resultado: bundle de 1.4GB inflado + codesign
        # assina arquivos em Resources com CodeDirectory referenciando
        # Frameworks (que apagamos) => AMFI rejeita launch silenciosamente.
        #
        # Fix canonical (consenso de 9 rodadas / 27 agentes de pesquisa):
        # limpar AMBOS Frameworks E Resources antes do codesign.
        #
        # Nosso codigo importa so QtCore/QtGui/QtMultimedia/QtWidgets —
        # todos os dev tools (Assistant, Designer, Linguist, qml*, rcc,
        # uic, lrelease, lupdate) sao removiveis sem breakage.
        run: |
          APP="dist/Transcritorio.app"
          echo "=== Tamanho antes ==="
          du -sh "$APP"
          echo ""
          for base in "$APP/Contents/Frameworks/PySide6" "$APP/Contents/Resources/PySide6"; do
            [ -d "$base" ] || continue
            echo "--- Limpando $base ---"
            echo "Sub-apps encontrados:"
            find "$base" -maxdepth 2 -type d \( -name '*.app' -o -name '*__dot__app' \) 2>/dev/null || true
            # a) Sub-apps .app e __dot__app (PyInstaller renomeia nested .app)
            find "$base" -maxdepth 2 -type d \( -name '*.app' -o -name '*__dot__app' \) \
                -exec rm -rf {} + 2>/dev/null || true
            # b) Ferramentas Qt nao usadas em runtime
            for tool in Assistant Designer Linguist \
                        lrelease lupdate rcc uic \
                        qmlls qmllint qmlformat qmltestrunner qmlimportscanner \
                        qmltyperegistrar qmlcachegen qmlpreview qmlprofiler \
                        qmlscene qmltime qmlplugindump qml; do
              find "$base" -maxdepth 3 -name "$tool" -type f -delete 2>/dev/null || true
              find "$base" -maxdepth 3 -name "$tool.debug" -type f -delete 2>/dev/null || true
            done
            # c) Symlinks orfaos (os que apontavam pros binarios/apps
            # que acabamos de deletar). Sem isso, codesign --deep tenta
            # seguir e quebra.
            find "$base" -maxdepth 3 -type l ! -exec test -e {} \; -delete 2>/dev/null || true
            echo ""
          done
          echo "=== Sub-apps remanescentes em todo o .app (deve ser vazio) ==="
          find "$APP/Contents" -maxdepth 4 -type d \( -name '*.app' -o -name '*__dot__app' \) 2>/dev/null || echo "(nenhum)"
          echo ""
          echo "=== Tamanho depois ==="
          du -sh "$APP"

      - name: Ad-hoc codesign (macOS 15 Sequoia Gatekeeper)
        # Sem assinatura, macOS 15+ bloqueia mesmo apos "Open Anyway"
        # porque sub-binarios (ffmpeg, Python framework, PySide6 dylibs)
        # falham na validacao secundaria. A assinatura ad-hoc ("-"
        # identity) e gratuita e satisfaz "binario tem signature valida",
        # o que combinado com "Open Anyway" manual permite a execucao.
        #
        # --force: sobrescreve se ja assinado
        # --deep: assina recursivamente todo Mach-O no .app
        # --sign -: identity "-" significa ad-hoc (self-signed, no cert)
        #
        # Nota: --verify --strict pode reclamar de symlinks orfaos apos
        # a remocao dos Qt dev tools no step anterior. O que importa e
        # que o SIGN em si passe; a verificacao top-level tambem.
        # Verificacoes aninhadas --deep --strict sao best-effort e nao
        # bloqueiam o build.
        run: |
          set -e
          echo "=== Aplicando ad-hoc codesign ==="
          codesign --force --deep --sign - dist/Transcritorio.app
          echo ""
          echo "=== Verificacao top-level (obrigatoria) ==="
          codesign --verify --verbose=2 dist/Transcritorio.app
          echo ""
          echo "=== Assinatura do bundle (metadados) ==="
          codesign -dv --verbose=2 dist/Transcritorio.app 2>&1 | head -12
          echo ""
          echo "=== Verificacao recursiva (best-effort, nao bloqueia) ==="
          set +e
          codesign --verify --deep --strict --verbose=2 dist/Transcritorio.app 2>&1 | tail -20
          DEEP_RC=$?
          set -e
          if [ $DEEP_RC -ne 0 ]; then
            echo ""
            echo "[aviso] --verify --deep --strict retornou $DEEP_RC."
            echo "Isso pode ser ruido de symlinks orfaos apos a remocao dos"
            echo "Qt dev tools no step anterior (PyInstaller gera referencias"
            echo "internas que nao foram atualizadas). A assinatura top-level"
            echo "passou, que e o que Gatekeeper verifica na primeira abertura."
          else
            echo "[ok] verify --deep --strict passou"
          fi
          echo ""
          echo "=== spctl assess (mostra veredicto Gatekeeper) ==="
          spctl --assess --verbose=4 dist/Transcritorio.app 2>&1 || true

      - name: Prepare DMG source (app + script de desbloqueio)
        # Monta um diretorio com tudo que vai aparecer no DMG. Alem do .app,
        # incluimos um script .command que o usuario clica caso o Gatekeeper
        # bloqueie o app apos "Open Anyway" (comportamento do macOS 15.1+).
        # O script roda xattr -dr com.apple.quarantine em /Applications/
        # Transcritorio.app — documentado pela Apple como workaround seguro.
        # Shell scripts (.command) dentro de um DMG quarentined NAO sao
        # bloqueados pelo Gatekeeper, entao o usuario consegue executa-lo.
        run: |
          mkdir -p dmg-source
          cp -R dist/Transcritorio.app dmg-source/

          # Script de fix + diagnostico. Tres funcoes integradas:
          # 1. Detecta o estado do Transcritorio.app (assinatura, quarentena,
          #    Gatekeeper assessment, hardware, versao macOS, logs recentes)
          # 2. Tenta o fix automatico (xattr -dr com.apple.quarantine)
          # 3. Salva o relatorio inteiro em ~/Desktop/transcritorio-diagnostico-*.txt
          #    e abre no TextEdit, para o usuario poder enviar ao autor se o
          #    Transcritorio ainda nao abrir.
          cat > "dmg-source/Habilitar Transcritorio.command" <<'SCRIPT_EOF'
          #!/bin/bash
          # Transcritorio - Habilitar + Diagnostico
          # Se duplo-clique for bloqueado pelo macOS 15+: abra o Terminal
          # e arraste este arquivo para dentro dele, depois aperte Enter.

          APP="/Applications/Transcritorio.app"
          TS=$(date +%Y%m%d_%H%M%S)
          LOG="$HOME/Desktop/transcritorio-diagnostico-${TS}.txt"

          # tee: saida visivel no Terminal E copiada pro arquivo
          exec > >(tee "$LOG") 2>&1

          echo "============================================================"
          echo "  Transcritorio - Diagnostico + Habilitar primeira execucao"
          echo "============================================================"
          echo "Data: $(date)"
          echo "Relatorio sera salvo em: $LOG"
          echo ""

          echo "--- Sistema operacional ---"
          sw_vers 2>&1 || true
          uname -a 2>&1 || true
          echo "Arquitetura: $(uname -m)"
          echo ""

          echo "--- Hardware ---"
          sysctl -n machdep.cpu.brand_string 2>&1 || true
          sysctl -n hw.model 2>&1 || true
          echo ""

          if [ ! -d "$APP" ]; then
            echo "[ERRO] $APP nao existe."
            echo ""
            echo "Antes de rodar este script:"
            echo "  1. Abra o Transcritorio.dmg"
            echo "  2. Arraste Transcritorio.app para /Applications"
            echo "  3. Execute este script novamente"
            echo ""
            echo "Diagnostico salvo em:"
            echo "  $LOG"
            echo ""
            echo "Aperte Enter para fechar."
            read _
            exit 1
          fi

          echo "--- Transcritorio.app encontrado ---"
          du -sh "$APP" 2>&1 | awk '{print "Tamanho total: " $1}'
          echo ""

          echo "--- Assinatura de codigo (codesign -dv) ---"
          codesign -dv "$APP" 2>&1 | head -12 || true
          echo ""

          echo "--- Verificacao da assinatura ---"
          if codesign --verify --deep --strict "$APP" 2>&1; then
            echo "[ok] assinatura valida"
          else
            echo "[falha] assinatura invalida ou ausente"
          fi
          echo ""

          echo "--- Avaliacao do Gatekeeper (spctl) ---"
          spctl --assess --verbose=4 "$APP" 2>&1 | head -5 || true
          echo ""

          echo "--- Atributos estendidos antes do fix ---"
          xattr -l "$APP" 2>&1 | head -10 || true
          echo ""

          if xattr -l "$APP" 2>/dev/null | grep -q "com.apple.quarantine"; then
            echo "--- Removendo flag de quarentena ---"
            if xattr -dr com.apple.quarantine "$APP" 2>&1; then
              echo "[ok] quarentena removida sem sudo"
            else
              echo "Pedindo senha do seu Mac para remover quarentena:"
              sudo xattr -dr com.apple.quarantine "$APP" 2>&1
              echo "[ok] quarentena removida com sudo"
            fi
            echo ""
            echo "--- Atributos apos fix ---"
            xattr -l "$APP" 2>&1 || true
          else
            echo "[diag] .app sem quarentena (nada a fazer aqui)."
          fi
          echo ""

          echo "--- Logs do Gatekeeper / syspolicyd (ultimos 10 min) ---"
          log show \
            --predicate 'eventMessage CONTAINS "Transcritorio" OR subsystem == "com.apple.syspolicy"' \
            --last 10m --style compact 2>&1 | tail -30 || true
          echo ""

          echo "--- Crash reports recentes (se existirem) ---"
          CRASH_DIR="$HOME/Library/Logs/DiagnosticReports"
          if [ -d "$CRASH_DIR" ]; then
            ls -t "$CRASH_DIR" 2>/dev/null | grep -i transcrit | head -3 || true
          fi
          echo ""

          echo "============================================================"
          echo "  RELATORIO SALVO EM:"
          echo "  $LOG"
          echo ""
          echo "  >>> PROXIMO PASSO (IMPORTANTE) <<<"
          echo ""
          echo "  1. Va ate a pasta Aplicativos (Applications)."
          echo "  2. Clique com o botao DIREITO no icone Transcritorio."
          echo "  3. Escolha \"Abrir\" no menu que aparece."
          echo "  4. Se o Mac avisar \"aplicativo nao verificado\", clique"
          echo "     em \"Abrir\" para confirmar."
          echo "  5. Se ainda bloquear: Ajustes do Sistema -> Privacidade e"
          echo "     Seguranca -> role ate embaixo -> \"Abrir mesmo assim\"."
          echo ""
          echo "  OBS: o duplo-clique normal NAO funciona na primeira vez."
          echo "  Precisa ser clique DIREITO -> Abrir. Depois que funcionar"
          echo "  uma vez, o duplo-clique passa a funcionar normalmente."
          echo ""
          echo "  Se mesmo assim nao abrir, envie o arquivo de diagnostico"
          echo "  acima para o desenvolvedor. O arquivo ja foi aberto no"
          echo "  TextEdit; basta anexar ao email / WhatsApp."
          echo "============================================================"
          echo ""

          # abre o relatorio automaticamente pro usuario ver
          open -a TextEdit "$LOG" 2>/dev/null || true

          echo "(Esta janela fecha em 5 segundos...)"
          sleep 5
          osascript -e 'tell application "Terminal" to close first window' 2>/dev/null || true
          SCRIPT_EOF
          chmod +x "dmg-source/Habilitar Transcritorio.command"

          echo "=== Conteudo do dmg-source ==="
          ls -la dmg-source/

      - name: Create DMG
        run: |
          rm -f Transcritorio.dmg
          BG_ARG=""
          if [ -f packaging/mac/dmg_background.png ]; then
            BG_ARG="--background packaging/mac/dmg_background.png"
          fi
          # Layout: app a esquerda, Applications symlink a direita, script
          # de desbloqueio no centro-baixo (clique de exceção).
          create-dmg \
            --volname "Transcritorio" \
            --window-pos 200 120 \
            --window-size 680 460 \
            --icon-size 96 \
            --icon "Transcritorio.app" 160 180 \
            --icon "Habilitar Transcritorio.command" 340 320 \
            --app-drop-link 520 180 \
            --hide-extension "Transcritorio.app" \
            --hide-extension "Habilitar Transcritorio.command" \
            --hdiutil-quiet \
            $BG_ARG \
            "Transcritorio.dmg" \
            "dmg-source" \
            || (echo "create-dmg falhou — tentando hdiutil direto" && \
                hdiutil create -volname "Transcritorio" -srcfolder "dmg-source" -ov -format UDZO "Transcritorio.dmg")
          ls -la Transcritorio.dmg

      - name: Verify DMG contents (script is executable)
        # Valida que o .command preservou o bit de execucao dentro do DMG.
        # hdiutil attach para inspecao read-only.
        run: |
          MOUNT=$(hdiutil attach -readonly -nobrowse Transcritorio.dmg | tail -1 | awk '{print $NF}')
          echo "Mounted at: $MOUNT"
          ls -la "$MOUNT/"
          if [ -x "$MOUNT/Habilitar Transcritorio.command" ]; then
            echo "[ok] script tem bit de execucao"
          else
            echo "[aviso] script sem bit de execucao — vai falhar no duplo-clique"
            exit 1
          fi
          hdiutil detach "$MOUNT" || true

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: Transcritorio-macos-dmg
          path: Transcritorio.dmg
          retention-days: 30

  # =========================================================================
  # Windows Installer (windows-latest)
  # =========================================================================
  build-windows-installer:
    needs: live-smoke-hf
    runs-on: windows-latest
    # Pulado em rebuild parcial quando "windows" nao esta na lista
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.only_platforms == '' || contains(inputs.only_platforms, 'windows') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python deps (CUDA torch)
        shell: pwsh
        run: |
          python -m pip install --upgrade pip wheel setuptools
          # Windows: instalar torch CUDA 12.8 (mesma versao do build local)
          python -m pip install torch==2.8.0 torchaudio==2.8.0 torchvision==0.23.0 `
            --index-url https://download.pytorch.org/whl/cu128
          python -m pip install torchcodec==0.7.0
          python -m pip install -e . "pyinstaller>=6.0"

      - name: Download + stage FFmpeg (BtbN 7.1 shared)
        shell: pwsh
        run: |
          $FfmpegUrl = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-n7.1-latest-win64-gpl-shared-7.1.zip"
          $FfmpegZip = "$env:RUNNER_TEMP\ffmpeg.zip"
          $FfmpegExtract = "$env:RUNNER_TEMP\ffmpeg-extract"
          $FfmpegTarget = "$env:GITHUB_WORKSPACE\packaging\vendor\ffmpeg"
          Write-Host "Baixando FFmpeg..."
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          Invoke-WebRequest -Uri $FfmpegUrl -OutFile $FfmpegZip -UseBasicParsing
          Expand-Archive -Path $FfmpegZip -DestinationPath $FfmpegExtract -Force
          $ExtractedDir = Get-ChildItem $FfmpegExtract -Directory | Select-Object -First 1
          if (Test-Path $FfmpegTarget) { Remove-Item $FfmpegTarget -Recurse -Force }
          New-Item -ItemType Directory -Path (Split-Path $FfmpegTarget) -Force | Out-Null
          Copy-Item $ExtractedDir.FullName $FfmpegTarget -Recurse -Force
          Get-ChildItem $FfmpegTarget\bin | ForEach-Object { Write-Host "  $_" }

      - name: Run PyInstaller
        shell: pwsh
        env:
          TRANSCRITORIO_REPO_ROOT: ${{ github.workspace }}
          TRANSCRITORIO_BUNDLE_VARIANT: full
        run: |
          python -m PyInstaller --distpath dist --workpath build `
            --clean --noconfirm packaging/transcritorio.spec
          # Verifica que os 3 executaveis sairam
          if (-not (Test-Path "dist/Transcritorio/Transcritorio.exe")) {
            throw "Transcritorio.exe nao gerado"
          }
          if (-not (Test-Path "dist/Transcritorio/transcritorio-cli.exe")) {
            throw "transcritorio-cli.exe nao gerado"
          }
          if (-not (Test-Path "dist/Transcritorio/whisperx.exe")) {
            throw "whisperx.exe nao gerado"
          }
          # Verifica que torch_cuda.dll esta la (variant=full)
          $TorchCuda = Get-ChildItem "dist/Transcritorio/_internal/torch/lib" -Filter "torch_cuda.dll" -ErrorAction SilentlyContinue
          if (-not $TorchCuda) { throw "torch_cuda.dll faltando em variant=full" }
          Write-Host "  torch_cuda.dll: $($TorchCuda.FullName) ($([math]::Round($TorchCuda.Length/1MB, 0)) MB)"

      - name: Split bundle — extrai CUDA libs para cuda_pack/
        shell: pwsh
        run: |
          # split_bundle.py move arquivos CUDA de dist/Transcritorio/ para
          # cuda_pack/, preservando estrutura de diretorios. O bundle
          # base resultante roda em CPU; os arquivos em cuda_pack/ podem
          # ser redundantemente copiados para restaurar a aceleracao.
          python packaging/split_bundle.py dist/Transcritorio cuda_pack
          # Validacao rapida — 2026-04-23: torch_cuda.dll e IAT obrigatoria,
          # fica no base. Canario do split e cudnn_ops64_9.dll (lazy-load).
          if (-not (Test-Path "cuda_pack/FILES.manifest")) { throw "split: manifest nao gerado" }
          if (-not (Test-Path "dist/Transcritorio/_internal/torch/lib/torch_cuda.dll")) {
            throw "split: torch_cuda.dll sumiu do dist/ (e IAT, deveria ter ficado)"
          }
          if (Test-Path "dist/Transcritorio/_internal/torch/lib/cudnn_ops64_9.dll") {
            throw "split: cudnn_ops64_9.dll ainda no dist/ (deveria ter movido)"
          }
          if (-not (Test-Path "cuda_pack/_internal/torch/lib/cudnn_ops64_9.dll")) {
            throw "split: cudnn_ops64_9.dll NAO apareceu em cuda_pack/"
          }
          $ManifestLines = (Get-Content "cuda_pack/FILES.manifest" | Measure-Object -Line).Lines
          Write-Host "  split: $ManifestLines arquivos movidos"
          $DistSize = [math]::Round(((Get-ChildItem dist/Transcritorio -Recurse -File | Measure-Object Length -Sum).Sum / 1GB), 2)
          $PackSize = [math]::Round(((Get-ChildItem cuda_pack -Recurse -File | Measure-Object Length -Sum).Sum / 1GB), 2)
          Write-Host "  Base bundle (CPU): $DistSize GB"
          Write-Host "  CUDA pack:         $PackSize GB"

      - name: Frozen-bundle smoke-test (POS-split, CPU-only)
        # Gate critico end-to-end: roda transcritorio-cli.exe FROZEN contra
        # o bundle CPU-only (pos split_bundle). Faz download real (72 MB),
        # verify, load, transcribe silencio. Se qualquer passo falhar,
        # release PARA.
        #
        # Importante: roda APOS split_bundle porque o bundle CPU-only nao
        # tenta carregar CUDA DLLs. Os runners Windows do GitHub Actions
        # nao tem NVIDIA driver, entao torch faria load fail em cusolver64
        # se CUDA libs ainda estivessem em dist/. Split move-as pra
        # cuda_pack/ (usuario baixa depois).
        shell: pwsh
        run: |
          & "dist\Transcritorio\transcritorio-cli.exe" models smoke-test
          if ($LASTEXITCODE -ne 0) { throw "smoke-test FAIL $LASTEXITCODE" }

      - name: Frozen-bundle whisperx.exe import chain gate
        # Gate contra bugs de copy_metadata/hiddenimports em transformers/whisperx.
        # `whisperx.exe --help` passa antes dos imports lazy, entao precisamos
        # de audio real para exercitar audio_utils.py:55 (version("torchcodec"))
        # e toda a cadeia transformers.Wav2Vec2ForCTC -> torchaudio.
        # Bug historico v0.1.1-v0.1.4: PackageNotFoundError: torchcodec,
        # ModuleNotFoundError: torchvision.
        # Sem --model_cache_only para deixar o whisperx baixar tiny se preciso.
        shell: pwsh
        run: |
          python -c "import wave; w=wave.open('silence.wav','wb'); w.setnchannels(1); w.setsampwidth(2); w.setframerate(16000); w.writeframes(b'\0' * (16000 * 3 * 2)); w.close()"
          & "dist\Transcritorio\whisperx.exe" silence.wav --model tiny --device cpu --compute_type int8 --no_align --language pt --output_dir wx_out --model_dir "$env:RUNNER_TEMP\tiny_cache"
          if ($LASTEXITCODE -ne 0) { throw "whisperx.exe FAIL exit $LASTEXITCODE — bug de import" }

      - name: Frozen-bundle cache-verify gate (fake cache, 2 variantes)
        shell: pwsh
        run: |
          $FakeCache = "$env:RUNNER_TEMP\fake_hf_cache"
          $CLI = "dist\Transcritorio\transcritorio-cli.exe"
          Remove-Item $FakeCache -Recurse -Force -ErrorAction SilentlyContinue
          python tests/prepare_fake_hf_cache.py "$FakeCache"
          $env:TRANSCRITORIO_MODEL_CACHE = $FakeCache
          & $CLI models verify
          if ($LASTEXITCODE -ne 0) { throw "verify v1 falhou ($LASTEXITCODE)" }
          Remove-Item $FakeCache -Recurse -Force
          python tests/prepare_fake_hf_cache.py "$FakeCache" --force-copy
          $env:TRANSCRITORIO_MODEL_CACHE = $FakeCache
          & $CLI models verify
          if ($LASTEXITCODE -ne 0) { throw "verify v2 falhou ($LASTEXITCODE)" }
          Write-Host "OK: frozen Windows CLI valida ambas variantes"

      - name: Zip cuda_pack
        shell: pwsh
        run: |
          $Version = (Select-String 'version = "([^"]+)"' pyproject.toml).Matches.Groups[1].Value
          $ZipName = "transcritorio-cuda-pack-$Version-win64.zip"
          Compress-Archive -Path cuda_pack\* -DestinationPath $ZipName -CompressionLevel Optimal
          $ZipSize = [math]::Round((Get-Item $ZipName).Length / 1MB, 0)
          Write-Host "  $ZipName ($ZipSize MB)"

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          # Procura ISCC.exe
          $Iscc = Get-ChildItem -Path "C:\Program Files (x86)\Inno Setup 6\ISCC.exe", "C:\Program Files\Inno Setup 6\ISCC.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $Iscc) { throw "ISCC.exe nao encontrado apos choco install innosetup" }
          Write-Host "ISCC: $($Iscc.FullName)"
          "$($Iscc.DirectoryName)" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Verify tag matches AppVersion in .iss
        # Em push de tag v*, valida que iss tem AppVersion igual a tag, senao
        # o [Code] do installer monta URL do cuda_pack apontando pra release
        # errada (404). Skip em workflow_dispatch (sem tag).
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $TagVer = "${{ github.ref_name }}".TrimStart('v')
          $IssLine = (Get-Content packaging\transcritorio.iss | Select-String '#define AppVersion').Line
          if ($IssLine -notmatch '"([^"]+)"') { throw "AppVersion nao encontrado em iss" }
          $IssVer = $matches[1]
          Write-Host "Tag: v$TagVer  AppVersion: $IssVer"
          if ($TagVer -ne $IssVer) {
            throw "MISMATCH: tag=v$TagVer mas iss=$IssVer. Bumpe AppVersion antes do tag."
          }

      - name: Run Inno Setup compiler
        shell: pwsh
        run: |
          $OutDir = "$env:GITHUB_WORKSPACE\installer-out"
          New-Item -ItemType Directory -Path $OutDir -Force | Out-Null
          ISCC.exe /DBundleDir="$env:GITHUB_WORKSPACE\dist\Transcritorio" `
                   /O"$OutDir" `
                   packaging\transcritorio.iss
          Get-ChildItem $OutDir | ForEach-Object { Write-Host "  $_ ($([math]::Round($_.Length/1MB, 0)) MB)" }

      - name: Setup.exe smoke (silent install)
        # Gate contra erro Pascal silencioso no [Code] do installer. Sem GPU
        # no runner do GitHub, /SKIPCUDA=1 pula o branch de download — testa
        # so a copia do bundle base e a sintaxe do Pascal. Se Pascal explode,
        # /VERYSILENT retorna != 0 e o gate falha.
        shell: pwsh
        run: |
          $Setup = (Get-ChildItem "$env:GITHUB_WORKSPACE\installer-out\*.exe" | Select-Object -First 1).FullName
          $InstDir = "$env:RUNNER_TEMP\smoke-install"
          $LogFile = "$env:RUNNER_TEMP\smoke-install.log"
          Remove-Item $InstDir -Recurse -Force -EA 0
          & $Setup /VERYSILENT /SUPPRESSMSGBOXES /SKIPCUDA=1 /DIR="$InstDir" /LOG="$LogFile" /CURRENTUSER
          if ($LASTEXITCODE -ne 0) {
            Write-Host "--- install log tail ---"
            if (Test-Path $LogFile) { Get-Content $LogFile -Tail 80 }
            throw "Setup.exe falhou exit=$LASTEXITCODE"
          }
          if (-not (Test-Path "$InstDir\Transcritorio.exe")) { throw "Transcritorio.exe ausente apos install" }
          Write-Host "OK: Setup.exe smoke install passou ($InstDir)"

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: Transcritorio-windows-installer
          # Monolithic Setup.exe (DiskSpanning disabled in .iss). Single file
          # download; users double-click and install runs.
          path: installer-out/*.exe
          retention-days: 30

      - name: Upload CUDA pack
        uses: actions/upload-artifact@v4
        with:
          name: Transcritorio-windows-cuda-pack
          path: transcritorio-cuda-pack-*-win64.zip
          retention-days: 30

  # =========================================================================
  # Cria/atualiza GitHub Release. Aceita 2 gatilhos:
  # - Push de tag v*: cria Release nova.
  # - workflow_dispatch com only_platforms nao-vazio: atualiza Release
  #   existente (mesma tag). Jobs pulados nao tem artefatos; action-gh-release
  #   com files: glob nao falha se o glob retorna vazio, preservando os
  #   artefatos antigos dessas plataformas na Release.
  # =========================================================================
  publish-release:
    # always() para rodar mesmo com jobs pulados (skipped). Abaixo filtramos
    # por sucesso dos jobs que efetivamente rodaram.
    if: ${{ always() && (startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.only_platforms != '')) }}
    needs: [build-linux-appimage, build-macos-dmg, build-windows-installer]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create/update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Em push de tag v*, usa a propria tag (github.ref). Em rebuild parcial
          # via workflow_dispatch, usa o target_tag explicito (ex: v0.1.1) para
          # atualizar a Release existente. Nomes iguais de arquivo substituem;
          # plataformas puladas tem glob vazio -> artefatos antigos preservados.
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.target_tag != '' && inputs.target_tag || github.ref_name }}
          files: |
            artifacts/**/*.AppImage
            artifacts/**/*.dmg
            artifacts/**/*-Setup.exe
            artifacts/**/*-cuda-pack-*.zip
          draft: false
          # generate_release_notes: cria notas novas na primeira vez; em update
          # subsequente mantem as notas existentes.
          generate_release_notes: ${{ startsWith(github.ref, 'refs/tags/v') }}
          fail_on_unmatched_files: false

      # Dispara rebuild do site antrologos.github.io para pegar a nova versao.
      # Exige secret SITE_DISPATCH_PAT (PAT fine-grained com contents:write
      # em antrologos.github.io). Se o secret nao existe, o step apenas avisa
      # e segue — nao quebra a release.
      #
      # Nota: secrets nao sao acessiveis em `if:` step-level. Por isso o
      # check e feito dentro do `run:`, onde secrets sao expostos via env.
      - name: Trigger site rebuild
        env:
          SITE_DISPATCH_PAT: ${{ secrets.SITE_DISPATCH_PAT }}
          VERSION: ${{ github.ref_name }}
        run: |
          if [ -z "${SITE_DISPATCH_PAT}" ]; then
            echo "::warning::SITE_DISPATCH_PAT nao configurado. Pulando rebuild automatico do site (veja docs/SITE_DISPATCH_PAT.md)."
            exit 0
          fi
          VER="${VERSION#v}"
          echo "Disparando rebuild do site para v${VER}..."
          curl -fsSL -X POST \
            -H "Authorization: Bearer ${SITE_DISPATCH_PAT}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/antrologos/antrologos.github.io/dispatches \
            -d "{\"event_type\":\"transcritorio-release\",\"client_payload\":{\"version\":\"${VER}\"}}"
          echo "OK: dispatch enviado para antrologos.github.io"
